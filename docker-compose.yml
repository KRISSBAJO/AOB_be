services:
  postgres:
    image: postgres:16-alpine
    container_name: aog-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aog_service
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aog_service"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
